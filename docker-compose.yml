# ============================================================
# 合群汽车AI+业务能力知识库 —— Docker Compose 生产部署
# 启动: docker compose up -d
# 查看: docker compose logs -f api
# 停止: docker compose down -v
# ============================================================

services:
  # ---- PostgreSQL 16 ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hqevoai-pg
    environment:
      POSTGRES_USER: hqevoai
      POSTGRES_PASSWORD: hqevoai
      POSTGRES_DB: hqevoai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hqevoai -d hqevoai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis 7 + AOF 持久化 ----
  redis:
    image: redis:7-alpine
    container_name: hqevoai-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- FastAPI (含 Vue 静态文件) ----
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hqevoai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hqevoai:hqevoai@postgres:5432/hqevoai
      DATABASE_URL_SYNC: postgresql://hqevoai:hqevoai@postgres:5432/hqevoai
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - app_logs:/app/logs
      - ./backend/sql:/app/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Nginx 反向代理（可选，生产推荐）----
  nginx:
    image: nginx:alpine
    container_name: hqevoai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - production

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  app_logs:
    driver: local
